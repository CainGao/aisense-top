title: AI Sense
description: AI时代的技术和商业洞察
author: 功哥
url: "https://aisense.top"
baseurl: ""

# Markdown配置
markdown: kramdown

# 文章URL格式 - 简化版本
permalink: /posts/:year-:month-:day-:title.html

# 插件
plugins:
  - jekyll-seo-tag

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - news/
  - tools/
  - about/
  - database/
  - scripts/
  - CLEANUP-GUIDE.md
  - Moltbot-Skills-Selection.md
  - NEWS-SOURCES.md
  - TOOLS-SOURCES.md

# 包含文件
include:
  - _pages

# 访问统计和广告配置（需要在对应平台申请后填入）
# Google Analytics（访问统计）
google_analytics: UA-XXXXXXXXX-X  # 替换为你的Google Analytics ID

# Google AdSense（广告联盟）
google_adsense: ca-pub-XXXXXXXXXX  # 替换为你的AdSense发布商ID

# 百度统计（可选）
baidu_tongji: XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX  # 替换为你的百度统计ID
