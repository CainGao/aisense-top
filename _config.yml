title: AI Sense
description: AI时代的技术和商业洞察
author: 功哥
url: "https://aisense.top"
baseurl: ""

# Markdown配置
markdown: kramdown

# 插件
plugins:
  - jekyll-seo-tag

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - news/
  - tools/
  - about/
  - database/
  - scripts/
  - CLEANUP-GUIDE.md
  - Moltbot-Skills-Selection.md
  - NEWS-SOURCES.md
  - TOOLS-SOURCES.md

# 包含文件
include:
  - _pages
